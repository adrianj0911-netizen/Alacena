            </div>
            <!-- Filtros de Categoría -->

            </div>
            <div id="list-inventario" class="space-y-3">

            </div>
        </section>

        <!-- VISTA: COMPRA -->
        <section id="view-compra" class="hidden space-y-4">

            <div class="flex items-center gap-2">
                <input type="text" id="input-compra" placeholder="¿Qué necesitamos comprar?" class="flex-1 input-custom text-sm">

            </div>
            <div id="list-compra" class="space-y-3">

            </div>
        </section>

        <!-- VISTA: RECETAS -->

            <div class="flex justify-between items-center">

                    <select id="item-unit" class="w-1/2 p-3 outline-none bg-gray-50 text-xs font-bold">
                        <option value="unidades">unidades</option>
                        <option value="gramos">gramos (g)</option>
                        <option value="kilogramos">kilogramos (kg)</option>
                        <option value="mililitros">mililitros (ml)</option>
                        <option value="litros">litros (L)</option>
                        <option value="packs">packs</option>
                    </select>

    <!-- MODAL: CONFIRMAR COMPRA -->

            <p id="confirm-buy-text" class="text-gray-600 text-sm"></p>
            
            <div class="space-y-3">
                <div class="space-y-1">

    <!-- MODAL: NUEVA/EDITAR RECETA -->

            <h3 id="modal-receta-titulo" class="text-xl font-bold">Crear Receta</h3>
            <input type="hidden" id="receta-id-edit" value="">
            
            <div class="space-y-3">
                <input type="text" id="receta-nombre" placeholder="Nombre del plato" class="input-custom">
                
                <div class="space-y-1">
                    <p class="font-bold text-xs text-orange-600 uppercase">Categoría de Comida:</p>
                    <select id="receta-categoria-tipo" class="input-custom text-sm">
                        <option value="desayuno">☕ Desayuno</option>
                        <option value="almuerzo">🍲 Almuerzo</option>
                        <option value="cena">🌙 Cena</option>
                    </select>
                </div>
            </div>

            <div id="receta-ingredientes-container" class="space-y-2">

            <div class="space-y-1 pt-2">

            <div class="flex gap-2 pt-4">
                <button onclick="ui.toggleModal('modal-receta')" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">Cerrar</button>

    <!-- MODAL: DETALLES DE RECETA -->

                    <h3 id="detalle-titulo" class="text-2xl font-bold text-marron capitalize"></h3>

            <div class="overflow-y-auto flex-1 pr-2 space-y-6 mt-2">
                <div>
                    <h4 class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-2">Ingredientes</h4>
                    <ul id="detalle-ingredientes" class="space-y-2"></ul>
                </div>
                <div>
                    <h4 class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-2">Preparación</h4>

            </div>
            <div id="detalle-acciones" class="pt-4 border-t">

            </div>
        </div>

    <!-- MODAL: CONFIGURACIÓN CATEGORÍAS -->
    <div id="modal-config-cats" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 space-y-4 shadow-2xl">
            <h3 class="text-xl font-bold">Gestionar Categorías</h3>
            <div class="flex gap-2">
                <input type="text" id="new-cat-emoji" placeholder="Emoji" class="w-16 input-custom text-center">
                <input type="text" id="new-cat-name" placeholder="Nombre Categoría" class="flex-1 input-custom">
                <button onclick="app.saveCategory()" class="btn-naranja px-4 rounded-xl font-bold">+</button>
            </div>
            <div id="list-cats-config" class="max-h-60 overflow-y-auto space-y-2">

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAtrcUB-jh8k8LdsJeUvIvYpXpMcEAGjoc",
            authDomain: "despensa-inteligente-b2e1d.firebaseapp.com",
            projectId: "despensa-inteligente-b2e1d",
            storageBucket: "despensa-inteligente-b2e1d.firebasestorage.app",
            messagingSenderId: "599630448369",
            appId: "1:599630448369:web:2916d1bd61fbe2824acb50"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ESTADO GLOBAL
        const state = {
            user: localStorage.getItem('pwa_user') || '',
            house: localStorage.getItem('pwa_house') || '',
            inventario: [],
            compra: [],
            recetas: [],
            categorias: [],
            filtroCat: 'todos',
            filtroReceta: 'todas'
        };

        const unidadesOptions = `
            <option value="unidades">unidades</option>
            <option value="gramos">gramos</option>
            <option value="kilogramos">kilogramos</option>
            <option value="mililitros">mililitros</option>
            <option value="litros">litros</option>
            <option value="packs">packs</option>
        `;

        // LÓGICA MATEMÁTICA DE UNIDADES
        const conversion = {
            normalize(qty, unit) {
                if (unit === 'gramos') return { val: qty / 1000, base: 'kilogramos' };
                if (unit === 'mililitros') return { val: qty / 1000, base: 'litros' };
                return { val: qty, base: unit };
            },
            display(qty, baseUnit) {
                if (baseUnit === 'kilogramos' && qty < 1) return { val: Math.round(qty * 1000), unit: 'gramos' };
                if (baseUnit === 'litros' && qty < 1) return { val: Math.round(qty * 1000), unit: 'mililitros' };
                return { val: Number(qty.toFixed(2)), unit: baseUnit };
            }
        };

        // UI CONTROLLER
        const ui = {
            switchView(view) {
                document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`view-${view}`).classList.remove('hidden');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-orange-600'));
                document.getElementById(`btn-nav-${view}`).classList.add('active', 'text-orange-600');
                window.scrollTo(0, 0);
            },
            toggleModal(id) {
                if(id === 'modal-receta' && document.getElementById(id).classList.contains('hidden')) {
                    document.getElementById('modal-receta-titulo').innerText = "Crear Receta";
                    document.getElementById('receta-id-edit').value = "";
                }
                document.getElementById(id).classList.toggle('hidden');
            },
            addIngredienteRow(valName = '', valQty = '', valUnit = 'unidades') {
                const container = document.getElementById('receta-ingredientes-container');
                const div = document.createElement('div');
                div.className = "flex gap-0 border-2 border-[#EEE] rounded-xl overflow-hidden ing-row mb-2";
                div.innerHTML = `
                    <input type="text" placeholder="Item" class="w-1/2 p-2 text-xs outline-none border-r border-[#EEE] ing-name" value="${valName}">
                    <input type="number" placeholder="Cant" class="w-1/4 p-2 text-xs outline-none border-r border-[#EEE] ing-qty" value="${valQty}">
                    <select class="w-1/4 p-2 text-[9px] outline-none bg-gray-50 font-bold ing-unit">
                        ${unidadesOptions}
                    </select>
                    <button onclick="this.parentElement.remove()" class="bg-red-50 text-red-500 font-bold px-3">X</button>
                `;
                div.querySelector('.ing-unit').value = valUnit;
                container.appendChild(div);
            },
            openRecetaDetalle(rid) {
                const receta = state.recetas.find(r => r.id === rid);
                if(!receta) return;

                const { apto, faltantes } = app.checkStock(receta);
                document.getElementById('detalle-titulo').innerText = receta.nombre;
                document.getElementById('detalle-tag').innerText = receta.tipo || 'comida';
                document.getElementById('detalle-preparacion').innerText = receta.preparacion || "Sin instrucciones detalladas.";
                
                const listContainer = document.getElementById('detalle-ingredientes');
                listContainer.innerHTML = receta.ingredientes.map(ing => {
                    const norm = n => n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    const inv = state.inventario.find(i => norm(i.nombre) === norm(ing.nombre));
                    const stock = inv ? inv.cantidad : 0;
                    const dispIng = conversion.display(ing.cantidad, ing.unidad);
                    const dispStock = conversion.display(stock, ing.unidad);
                    const color = stock >= ing.cantidad ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700';
                    return `
                        <li class="p-3 rounded-xl ${color} flex justify-between items-center text-sm">
                            <span class="font-bold uppercase">${ing.nombre}</span>
                            <span class="text-xs font-medium">${dispIng.val} ${dispIng.unit} (Tengo: ${dispStock.val} ${dispStock.unit})</span>
                        </li>
                    `;
                }).join('');

                document.getElementById('btn-edit-receta-detalle').onclick = () => {
                    this.toggleModal('modal-detalles-receta');
                    this.prepareEditReceta(rid);
                };

                const acciones = document.getElementById('detalle-acciones');
                acciones.innerHTML = apto 
                    ? `<button onclick="app.ejecutarCocina('${rid}'); ui.toggleModal('modal-detalles-receta');" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg">COCINAR AHORA 🍳</button>`
                    : `<button onclick="app.pedirFaltantes('${rid}'); ui.toggleModal('modal-detalles-receta');" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg">PEDIR FALTANTES 🛒</button>`;

                this.toggleModal('modal-detalles-receta');
            },
            prepareEditReceta(rid) {
                const receta = state.recetas.find(r => r.id === rid);
                if(!receta) return;

                document.getElementById('modal-receta-titulo').innerText = "Editar Receta";
                document.getElementById('receta-id-edit').value = rid;
                document.getElementById('receta-nombre').value = receta.nombre;
                document.getElementById('receta-categoria-tipo').value = receta.tipo;
                document.getElementById('receta-preparacion').value = receta.preparacion;

                const container = document.getElementById('receta-ingredientes-container');
                container.innerHTML = '<p class="font-bold text-xs text-orange-600 uppercase">Ingredientes Requeridos:</p>';
                receta.ingredientes.forEach(ing => {
                    const disp = conversion.display(ing.cantidad, ing.unidad);
                    this.addIngredienteRow(ing.nombre, disp.val, disp.unit);
                });

                this.toggleModal('modal-receta');
            },
            updateLoginUI() {
                if(state.user && state.house) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-header').classList.remove('hidden');
                    document.getElementById('view-container').classList.remove('hidden');
                    document.getElementById('bottom-nav').classList.remove('hidden');
                    document.getElementById('display-house').innerText = state.house.toUpperCase();
                    document.getElementById('display-user').innerText = `Chef: ${state.user}`;
                    app.initListeners();
                }
            }
        };

        // LÓGICA APP
        const app = {
            login() {
                const userInput = document.getElementById('login-user').value.trim();
                const houseInput = document.getElementById('login-house').value.trim().toLowerCase();
                if(!userInput || !houseInput) return alert("Rellena los campos de acceso");
                
                state.user = userInput;
                state.house = houseInput;
                localStorage.setItem('pwa_user', userInput);
                localStorage.setItem('pwa_house', houseInput);
                ui.updateLoginUI();
            },
            logout() {
                localStorage.clear();
                location.reload();
            },
            initListeners() {
                const houseRef = db.collection('casas').doc(state.house);
                
                houseRef.collection('categorias').onSnapshot(snap => {
                    const baseCats = [
                        {id: 'cat_veg', nombre: 'Vegetales', emoji: '🥦'},
                        {id: 'cat_car', nombre: 'Carnicería', emoji: '🥩'},
                        {id: 'cat_lac', nombre: 'Lácteos', emoji: '🥛'},
                        {id: 'cat_pan', nombre: 'Panadería', emoji: '🥖'},
                        {id: 'cat_des', nombre: 'Despensa', emoji: '🥫'},
                        {id: 'cat_lim', nombre: 'Limpieza', emoji: '🧼'},
                        {id: 'cat_dul', nombre: 'Dulces', emoji: '🍫'},
                        {id: 'cat_otr', nombre: 'Otros', emoji: '📦'}
                    ];
                    const customCats = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    state.categorias = [...baseCats, ...customCats];
                    this.renderCategoriesUI();
                });

                houseRef.collection('inventario').onSnapshot(snap => {
                    state.inventario = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.renderInventario();
                    this.renderRecetas(); 
                });

                houseRef.collection('compra').onSnapshot(snap => {
                    state.compra = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.renderCompra();
                });

                houseRef.collection('recetas').onSnapshot(snap => {
                    state.recetas = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.renderRecetas();
                });
            },

            async saveCategory() {
                const emoji = document.getElementById('new-cat-emoji').value.trim() || '📦';
                const name = document.getElementById('new-cat-name').value.trim();
                if(!name) return;
                await db.collection('casas').doc(state.house).collection('categorias').add({ nombre: name, emoji: emoji });
                document.getElementById('new-cat-emoji').value = '';
                document.getElementById('new-cat-name').value = '';
            },

            async deleteCategory(id) {
                if(id.startsWith('cat_')) return alert("Categorías base no pueden borrarse");
                await db.collection('casas').doc(state.house).collection('categorias').doc(id).delete();
            },

            renderCategoriesUI() {
                const selectors = document.querySelectorAll('.item-cat-select');
                const optionsHTML = state.categorias.map(c => `<option value="${c.emoji}">${c.emoji} ${c.nombre}</option>`).join('');
                selectors.forEach(select => {
                    select.innerHTML = optionsHTML;
                });
                
                const filterContainer = document.getElementById('filter-cats');
                if(filterContainer) {
                    filterContainer.innerHTML = `
                        <button onclick="app.setFiltroCat('todos')" class="px-4 py-2 rounded-full whitespace-nowrap text-sm font-bold ${state.filtroCat === 'todos' ? 'btn-naranja' : 'bg-white text-gray-500'}">Todos</button>
                        ${state.categorias.map(c => `
                            <button onclick="app.setFiltroCat('${c.emoji}')" class="px-4 py-2 rounded-full whitespace-nowrap text-sm font-bold ${state.filtroCat === c.emoji ? 'btn-naranja' : 'bg-white text-gray-500'}">
                                ${c.emoji} ${c.nombre}
                            </button>
                        `).join('')}
                    `;
                }

                const configList = document.getElementById('list-cats-config');
                if(configList) {
                    configList.innerHTML = state.categorias.map(c => `
                        <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                            <span>${c.emoji} ${c.nombre}</span>
                            ${!c.id.startsWith('cat_') ? `<button onclick="app.deleteCategory('${c.id}')" class="text-red-400">🗑️</button>` : '<span class="text-[8px] text-gray-300">BASE</span>'}
                        </div>
                    `).join('');
                }
            },

            setFiltroCat(cat) {
                state.filtroCat = cat;
                this.renderCategoriesUI();
                this.renderInventario();
            },

            setFiltroReceta(tipo) {
                state.filtroReceta = tipo;
                document.querySelectorAll('.filter-pill').forEach(btn => {
                    btn.classList.remove('active', 'bg-orange-500', 'text-white');
                    btn.classList.add('bg-white', 'text-gray-400');
                });
                const activeBtn = document.getElementById(`f-rec-${tipo}`);
                if(activeBtn) {
                    activeBtn.classList.add('active', 'bg-orange-500', 'text-white');
                    activeBtn.classList.remove('bg-white', 'text-gray-400');
                }
                this.renderRecetas();
            },

            async saveItem() {
                const name = document.getElementById('item-name').value.trim();
                const cat = document.getElementById('item-cat').value;
                const rawQty = parseFloat(document.getElementById('item-qty').value) || 0;
                const rawUnit = document.getElementById('item-unit').value;

                if(!name) return;
                const norm = conversion.normalize(rawQty, rawUnit);
                const docId = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const itemRef = db.collection('casas').doc(state.house).collection('inventario').doc(docId);
                const doc = await itemRef.get();

                if(doc.exists) {
                    await itemRef.update({ cantidad: firebase.firestore.FieldValue.increment(norm.val) });
                } else {
                    await itemRef.set({ nombre: name, categoria: cat, cantidad: norm.val, unidad: norm.base, user: state.user });
                }
                ui.toggleModal('modal-item');
                document.getElementById('item-name').value = '';
                document.getElementById('item-qty').value = '';
            },

            async updateQty(id, delta) {
                const itemRef = db.collection('casas').doc(state.house).collection('inventario').doc(id);
                const docSnapshot = await itemRef.get();
                if(!docSnapshot.exists) return;

                const current = docSnapshot.data().cantidad;
                const final = current + delta;

                if(final <= 0) {
                    await itemRef.delete();
                } else {
                    await itemRef.update({ cantidad: final });
                }
            },

            renderInventario() {
                const list = document.getElementById('list-inventario');
                const search = document.getElementById('search-inv').value.toLowerCase();
                list.innerHTML = '';

                let filtered = state.inventario.filter(i => i.nombre.toLowerCase().includes(search));
                if(state.filtroCat !== 'todos') {
                    filtered = filtered.filter(i => i.categoria === state.filtroCat);
                }

                if(filtered.length === 0) {
                    list.innerHTML = `<p class="text-center text-gray-400 py-10">Nada por aquí...</p>`;
                    return;
                }

                filtered.forEach(item => {
                    const display = conversion.display(item.cantidad, item.unidad);
                    const div = document.createElement('div');
                    div.className = "card-item p-4 flex justify-between items-center";
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">${item.categoria || '📦'}</span>
                            <div>
                                <h4 class="font-bold capitalize text-sm">${item.nombre}</h4>
                                <p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest">${display.val} ${display.unit}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="app.updateQty('${item.id}', -0.1)" class="w-8 h-8 rounded-full bg-orange-50 text-orange-600 font-black">-</button>
                            <span class="min-w-[40px] text-center font-bold text-xs">${display.val}<br><span class="text-[7px] opacity-40 uppercase">${display.unit}</span></span>
                            <button onclick="app.updateQty('${item.id}', 0.1)" class="w-8 h-8 rounded-full bg-orange-50 text-orange-600 font-black">+</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            },

            async addToCompra(nombre = '', cant = 1, unid = 'unidades') {
                const input = document.getElementById('input-compra');
                const val = nombre || input.value.trim();
                if(!val) return;

                await db.collection('casas').doc(state.house).collection('compra').add({
                    nombre: val, cantidad: cant, unidad: unid, user: state.user
                });
                input.value = '';
            },

            async removeItemCompra(id) {
                await db.collection('casas').doc(state.house).collection('compra').doc(id).delete();
            },

            async openConfirmBuy(item) {
                document.getElementById('confirm-buy-text').innerText = `Confirmando: ${item.nombre}`;
                document.getElementById('confirm-buy-qty').value = item.cantidad;
                document.getElementById('confirm-buy-unit-select').value = item.unidad; 

                const docId = item.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const existingItem = state.inventario.find(i => i.id === docId);
                if(existingItem && existingItem.categoria) {
                    document.getElementById('confirm-buy-cat-select').value = existingItem.categoria;
                } else {
                    document.getElementById('confirm-buy-cat-select').value = '📦';
                }

                ui.toggleModal('modal-confirm-buy');

                document.getElementById('btn-final-buy').onclick = async () => {
                    const rawQty = parseFloat(document.getElementById('confirm-buy-qty').value);
                    const selectedUnit = document.getElementById('confirm-buy-unit-select').value;
                    const selectedCat = document.getElementById('confirm-buy-cat-select').value;
                    const norm = conversion.normalize(rawQty, selectedUnit);

                    const itemRef = db.collection('casas').doc(state.house).collection('inventario').doc(docId);
                    const invDoc = await itemRef.get();
                    
                    if(invDoc.exists) {
                        await itemRef.update({ 
                            cantidad: firebase.firestore.FieldValue.increment(norm.val),
                            categoria: selectedCat 
                        });
                    } else {
                        await itemRef.set({
                            nombre: item.nombre, categoria: selectedCat, cantidad: norm.val, unidad: norm.base, user: state.user
                        });
                    }
                    await this.removeItemCompra(item.id);
                    ui.toggleModal('modal-confirm-buy');
                };
            },

            renderCompra() {
                const list = document.getElementById('list-compra');
                list.innerHTML = '';
                if(state.compra.length === 0) {
                    list.innerHTML = `<p class="text-center text-gray-400 py-10">¡Todo listo!</p>`;
                    return;
                }
                state.compra.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "card-item p-4 flex justify-between items-center";
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <button onclick="app.openConfirmBuy(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="w-8 h-8 border-2 border-orange-400 rounded-full flex items-center justify-center">
                                <span class="text-[10px]">OK</span>
                            </button>
                            <div>
                                <h4 class="font-bold text-sm">${item.nombre}</h4>
                                <p class="text-[10px] text-gray-400 uppercase">${item.cantidad} ${item.unidad}</p>
                            </div>
                        </div>
                        <button onclick="app.removeItemCompra('${item.id}')" class="p-2 text-red-200">🗑️</button>
                    `;
                    list.appendChild(div);
                });
            },

            async saveReceta() {
                const editId = document.getElementById('receta-id-edit').value;
                const nombre = document.getElementById('receta-nombre').value.trim();
                const tipo = document.getElementById('receta-categoria-tipo').value;
                const preparacion = document.getElementById('receta-preparacion').value.trim();
                const ingredientes = Array.from(document.querySelectorAll('.ing-row')).map(row => {
                    const rawQ = parseFloat(row.querySelector('.ing-qty').value) || 0;
                    const rawU = row.querySelector('.ing-unit').value;
                    const norm = conversion.normalize(rawQ, rawU);
                    return {
                        nombre: row.querySelector('.ing-name').value.trim(),
                        cantidad: norm.val,
                        unidad: norm.base
                    };
                }).filter(i => i.nombre);

                if(!nombre || ingredientes.length === 0) return alert("Faltan datos");

                const recetaData = { 
                    nombre, 
                    tipo,
                    ingredientes, 
                    preparacion,
                    user: state.user 
                };

                if(editId) {
                    await db.collection('casas').doc(state.house).collection('recetas').doc(editId).update(recetaData);
                } else {
                    // Por defecto las nuevas recetas no están fijadas
                    recetaData.fixed = false;
                    await db.collection('casas').doc(state.house).collection('recetas').add(recetaData);
                }
                
                ui.toggleModal('modal-receta');
                document.getElementById('receta-nombre').value = '';
                document.getElementById('receta-preparacion').value = '';
                document.getElementById('receta-ingredientes-container').innerHTML = '';
                document.getElementById('receta-id-edit').value = "";
                ui.addIngredienteRow();
            },

            checkStock(receta) {
                let faltantes = [];
                let apto = true;
                receta.ingredientes.forEach(ing => {
                    const norm = n => n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    const inv = state.inventario.find(i => norm(i.nombre) === norm(ing.nombre));
                    if(!inv || inv.cantidad < (ing.cantidad - 0.001)) { 
                        apto = false;
                        const faltaVal = ing.cantidad - (inv ? inv.cantidad : 0);
                        const displayFalta = conversion.display(faltaVal, ing.unidad);
                        faltantes.push({ ...ing, displayVal: displayFalta.val, displayUnit: displayFalta.unit });
                    }
                });
                return { apto, faltantes };
            },

            async toggleFixedReceta(id, currentStatus) {
                await db.collection('casas').doc(state.house).collection('recetas').doc(id).update({
                    fixed: !currentStatus
                });
            },

            async ejecutarCocina(id) {
                const receta = state.recetas.find(r => r.id === id);
                const batch = db.batch();
                const houseRef = db.collection('casas').doc(state.house);
                for (let ing of receta.ingredientes) {
                    const docId = ing.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    const ref = houseRef.collection('inventario').doc(docId);
                    const snap = await ref.get();
                    if(snap.exists) {
                        const nueva = snap.data().cantidad - ing.cantidad;
                        if(nueva <= 0) batch.delete(ref);
                        else batch.update(ref, { cantidad: nueva });
                    }
                }
                await batch.commit();
                alert("¡Plato preparado! Stock actualizado.");
            },

            async pedirFaltantes(rid) {
                const receta = state.recetas.find(r => r.id === rid);
                const { faltantes } = this.checkStock(receta);
                for(let f of faltantes) {
                    await this.addToCompra(f.nombre, f.displayVal, f.displayUnit);
                }
                alert("Faltantes enviados a la lista.");
                ui.switchView('compra');
            },

            renderRecetas() {
                const list = document.getElementById('list-recetas');
                list.innerHTML = '';
                
                let filtered = state.recetas;
                if(state.filtroReceta !== 'todas') {
                    filtered = state.recetas.filter(r => r.tipo === state.filtroReceta);
                }

                if(filtered.length === 0) {
                    list.innerHTML = `<p class="text-center text-gray-400 py-10">No hay recetas en esta categoría.</p>`;
                    return;
                }

                // ORDENACIÓN: 
                // 1. Fixed primero
                // 2. Disponibles segundo (apto)
                // 3. El resto
                const sortedRecetas = filtered.map(r => ({...r, status: this.checkStock(r)})).sort((a, b) => {
                    // Prioridad 1: Fijadas
                    if (a.fixed && !b.fixed) return -1;
                    if (!a.fixed && b.fixed) return 1;
                    
                    // Prioridad 2: Disponibles para cocinar
                    if (a.status.apto && !b.status.apto) return -1;
                    if (!a.status.apto && b.status.apto) return 1;
                    
                    return 0;
                });

                sortedRecetas.forEach(receta => {
                    const apto = receta.status.apto;
                    const isFixed = receta.fixed || false;
                    const div = document.createElement('div');
                    div.className = `card-item p-4 border-l-4 ${apto ? 'border-green-400' : 'border-orange-300'} cursor-pointer active:opacity-75 transition-opacity relative`;
                    div.onclick = (e) => {
                        if(e.target.closest('button')) return;
                        ui.openRecetaDetalle(receta.id);
                    };
                    
                    const resumenIng = receta.ingredientes.slice(0, 3).map(i => i.nombre).join(', ');
                    const extra = receta.ingredientes.length > 3 ? ` y ${receta.ingredientes.length - 3} más...` : '';

                    const iconMap = { desayuno: '☕', almuerzo: '🍲', cena: '🌙' };

                    div.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs">${iconMap[receta.tipo] || '🍳'}</span>
                                    <h4 class="font-bold text-marron capitalize truncate max-w-[150px]">${receta.nombre}</h4>
                                    ${isFixed ? '<span class="text-orange-500 text-xs">📌</span>' : ''}
                                </div>
                                <p class="text-[10px] text-gray-400 mt-1">📝 ${resumenIng}${extra}</p>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="app.toggleFixedReceta('${receta.id}', ${isFixed})" class="p-2 ${isFixed ? 'pin-active' : 'bg-gray-50 text-gray-400'} rounded-full text-[10px]" title="Fijar arriba">📌</button>
                                <button onclick="ui.prepareEditReceta('${receta.id}')" class="p-2 bg-blue-50 text-blue-400 rounded-full text-[10px]">✏️</button>
                                <button onclick="db.collection('casas').doc(state.house).collection('recetas').doc('${receta.id}').delete()" class="p-2 bg-red-50 text-red-300 rounded-full text-[10px]">🗑️</button>
                            </div>
                        </div>
                        <div class="mt-3 flex items-center justify-between">
                             <span class="text-[9px] font-bold px-2 py-1 rounded-full ${apto ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'} uppercase tracking-tight">
                                ${apto ? '¡Disponible!' : 'Faltan ingredientes'}
                             </span>
                             <span class="text-[10px] text-orange-500 font-bold">Ver receta →</span>
                        </div>
                    `;
                    list.appendChild(div);
                });
            }
        };

        window.onload = () => {
            ui.updateLoginUI();
            if(document.getElementById('receta-ingredientes-container').children.length <= 1) {
                ui.addIngredienteRow();
            }
        };
    </script>
</body>
</html>
